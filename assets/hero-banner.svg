<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="100%">
  <defs>
    <rect id="bg" width="1000" height="280" rx="10" fill="#0d1117"/>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    <linearGradient id="top-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .status { font-size: 11px; fill: #7d8590; font-weight: 600; letter-spacing: 0.5px; }
    .name { font-size: 38px; fill: #f0f6fc; font-weight: 700; letter-spacing: -0.5px; }
    .role { font-size: 18px; fill: #38bdf8; font-weight: 600; }
    .desc { font-size: 13.5px; fill: #8b949e; line-height: 1.5; }
    .pill { fill: #161b22; stroke: #30363d; stroke-width: 1px; }
    .pill-text { font-size: 11px; fill: #c9d1d9; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 1px; }
    .label { font-size: 10px; fill: #7d8590; font-weight: 700; letter-spacing: 1px; }
    .val { font-size: 14px; fill: #f0f6fc; font-weight: 600; }
    .sub { font-size: 11px; fill: #38bdf8; }
  </style>

  <!-- Background Base & Grid -->
  <use href="#bg" />
  <rect width="1000" height="280" rx="10" fill="url(#grid)"/>
  <rect x="0" y="0" width="1000" height="3" fill="url(#top-line)"/>

  <!-- Status Badge -->
  <g transform="translate(45, 34)">
    <rect x="0" y="0" width="185" height="24" rx="12" class="pill"/>
    <circle cx="14" cy="12" r="4" fill="#3fb950"/>
    <text x="26" y="16" class="sans status">ENGINEERING PROFILE</text>
  </g>

  <!-- Title & Role -->
  <text x="45" y="94" class="sans name">Sabbella Laharika</text>
  <text x="45" y="124" class="sans role">Software Engineer • AI &amp; Distributed Systems</text>
  
  <!-- Brief Summary -->
  <text x="45" y="152" class="sans desc">Building scalable, maintainable, and well-architected software solutions.</text>
  <text x="45" y="172" class="sans desc">Specializing in AI Systems, Backend Engineering, and Microservices.</text>

  <!-- Domain Pills -->
  <g transform="translate(45, 208)">
    <rect x="0" y="0" width="150" height="30" rx="6" class="pill"/>
    <text x="12" y="19" class="mono pill-text">🤖 AI &amp; ML Systems</text>

    <rect x="160" y="0" width="155" height="30" rx="6" class="pill"/>
    <text x="172" y="19" class="mono pill-text">⚡ Backend Systems</text>

    <rect x="325" y="0" width="155" height="30" rx="6" class="pill"/>
    <text x="337" y="19" class="mono pill-text">🌐 Distributed Systems</text>

    <rect x="490" y="0" width="145" height="30" rx="6" class="pill"/>
    <text x="502" y="19" class="mono pill-text">🐳 Docker-First Dev</text>
  </g>

  <!-- Right Dashboard Cards -->
  <g transform="translate(710, 34)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="245" height="64" rx="6" class="card"/>
    <text x="14" y="22" class="sans label">DEGREE</text>
    <text x="14" y="42" class="sans val">B.Tech in CSE</text>
    <text x="14" y="56" class="sans sub">Computer Science &amp; Eng.</text>

    <!-- Card 2 -->
    <rect x="0" y="74" width="245" height="64" rx="6" class="card"/>
    <text x="14" y="96" class="sans label">FOCUS</text>
    <text x="14" y="116" class="sans val">Production-Ready Software</text>
    <text x="14" y="130" class="sans sub">Clean Architecture • Scalability</text>

    <!-- Card 3 -->
    <rect x="0" y="148" width="245" height="64" rx="6" class="card"/>
    <text x="14" y="170" class="sans label">PORTFOLIO</text>
    <text x="14" y="190" class="sans val">Interactive Demos &amp; Specs</text>
    <text x="14" y="204" class="sans sub" fill="#3fb950">sabbella-laharika-portfolio.vercel.app</text>
  </g>
</svg>
